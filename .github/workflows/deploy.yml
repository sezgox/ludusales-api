name: Deploy Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Env & tool versions
        run: |
          echo "node: $(node -v)"
          echo "npm:  $(npm -v)"
          echo "npx:  $(npx -v)"

      - name: Install dependencies
        run: npm ci

      - name: Check
        run: npm run check

      - name: Deploy
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Dump Wrangler logs on failure
        if: failure()
        run: |
          echo "Listing Wrangler log directory:"
          ls -la ~/.config/.wrangler/logs || true
          for f in ~/.config/.wrangler/logs/*; do
            echo "===== $f ====="
            sed -n '1,200p' "$f" || true
            echo
          done
